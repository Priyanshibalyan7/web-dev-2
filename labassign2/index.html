<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="/style2.css">
</head>

<body>
    <header>
        <h1>ASYNC WEATHER TRACKER ⛅</h1>
    </header>
    <div id="container">

        <div id="search-box">
            <div id="first-search">
                <h3>Search City</h3>
                <form>
                    <input type="text" id="search-city" placeholder="Enter city name">
                    <button type="submit">Search 🔍</button>
                </form>
            </div>
        </div>

        <div id="weather-info">
            <h3>Weather Information</h3>
            <div id="weather-details"></div>
        </div>

        <div id="search-his">
            <h3>Search History</h3>
            <div id="search-history"></div>
        </div>
    </div>

    <script>
        let API = "d769095187837ce38f1d3c23296c4d6f";
        let cityInput = document.querySelector("#search-city");
        let form = document.querySelector("form");
        let weather = document.querySelector("#weather-details");
        let historyBox = document.querySelector("#search-history");

        async function getweatherinfo(city) {
            let response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API}&units=metric`);
            let data = await response.json();

            let card = document.createElement('div');
            card.innerHTML = `
                <div>City: ${data.name}, ${data.sys.country}</div>
                <div>Temp: ${data.main.temp}°C</div>
                <div>Weather: ${data.weather[0].main}</div>
                <div>Humidity: ${data.main.humidity}%</div>
                <div>Wind: ${data.wind.speed} m/s</div>
            `;

            weather.innerHTML = "";
            weather.append(card);

            saveCity(city); // Save city to history after successful search
        }

        function saveCity(city) {
            let cities = JSON.parse(localStorage.getItem("cities")) || [];

            if (!cities.includes(city)) {
                cities.push(city);
                localStorage.setItem("cities", JSON.stringify(cities));
            }

            displayHistory();
        }

        function displayHistory() {
            let cities = JSON.parse(localStorage.getItem("cities")) || [];
            historyBox.innerHTML = "";

            cities.forEach(city => {
                let item = document.createElement("div");
                item.className = "history-item";
                item.textContent = city;

                item.addEventListener("click", () => {
                    getweatherinfo(city);
                });

                historyBox.appendChild(item);
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (cityInput.value.trim() !== "") {
                getweatherinfo(cityInput.value.trim());
                cityInput.value = ""; // clear input after search
            }
        });

        displayHistory();
    </script>
</body>

</html>
